name: scan-and-publish

on:
  workflow_dispatch:
  schedule:
    # KST 16:20 = UTC 07:20
    - cron: "20 7 * * 1-5"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run Kiwoom scanner
        env:
          KIWOOM_APP_KEY: ${{ secrets.KIWOOM_APP_KEY }}
          KIWOOM_SECRET_KEY: ${{ secrets.KIWOOM_SECRET_KEY }}
          KIWOOM_BASE_URL: ${{ secrets.KIWOOM_BASE_URL || 'https://api.kiwoom.com' }}
          SCAN_LIMIT: ${{ vars.SCAN_LIMIT || '0' }}
          SCAN_MIN_VOLUME_RATIO: ${{ vars.SCAN_MIN_VOLUME_RATIO || '2.0' }}
          SCAN_MIN_PRICE_CHANGE_PCT: ${{ vars.SCAN_MIN_PRICE_CHANGE_PCT || '0' }}
        run: python scripts/scan.py --output public/data/latest.json
      - name: Commit latest scan result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/latest.json
          git diff --cached --quiet || git commit -m "chore: update latest scanner results"
          git push
